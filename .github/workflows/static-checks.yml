name: Static and Browser Checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-static-app:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            node --check "$file"
          done < <(find . -type f -name '*.js' -not -path './.git/*' -print0)

      - name: Verify required static entry points
        shell: bash
        run: |
          set -euo pipefail
          test -f meeting.html
          test -f archive.html
          test -f verify.html
          test -f style.css
          test -f config.js
          test -f config-v11.js
          test -f config-v12.js
          test -f config-v13.js
          test -f config-v14.js
          test -f config-v15.js
          test -f migrations.js
          test -f migrations-v10.js
          test -f migrations-v11.js
          test -f migrations-v12.js
          test -f migrations-v13.js
          test -f migrations-v14.js
          test -f migrations-v15.js
          test -f data-adapter.js
          test -f async-data-adapter.js
          test -f attachment-adapter.js
          test -f crypto-package-core.js
          test -f app.js
          test -f verify.js
          test -f features-v11-retention.js
          test -f features-v11-redaction.js
          test -f features-v11-redaction-policy.js
          test -f features-v12-export-approval.js
          test -f features-v12-fingerprint-policy.js
          test -f features-v12-release-audit.js
          test -f features-v12-compatibility.js
          test -f features-v13-disposition.js
          test -f features-v13.css
          test -f features-v14-recipient-policy.js
          test -f features-v14-policy-hardening.js
          test -f features-v14.css
          test -f features-v15-crypto.js
          test -f features-v15.css
          test -f archive-v11.js
          test -f archive-v13.js
          test -f manifest.webmanifest
          test -f service-worker.js
          test -f tests/v12-smoke.spec.js
          test -f tests/v13-smoke.spec.js
          test -f tests/v14-smoke.spec.js
          test -f tests/v14-stability.spec.js
          test -f tests/v15-crypto.spec.js

      - name: Verify v1.5 assets are loaded
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'features-v15.css' meeting.html
          grep -q 'config-v15.js' meeting.html
          grep -q 'migrations-v15.js' meeting.html
          grep -q 'crypto-package-core.js' meeting.html
          grep -q 'features-v15-crypto.js' meeting.html
          grep -q 'config-v15.js' archive.html
          grep -q 'migrations-v15.js' archive.html
          grep -q 'crypto-package-core.js' verify.html
          grep -q 'verify.js' verify.html
          grep -q 'methodz-meeting-manager-v1.5.0' service-worker.js
          grep -q 'schemaVersion = "1.5.0"' config-v15.js
          grep -q 'privateKeyStorage: "memory-only"' config-v15.js
          grep -q 'features-v15.css' service-worker.js
          grep -q 'config-v15.js' service-worker.js
          grep -q 'migrations-v15.js' service-worker.js
          grep -q 'crypto-package-core.js' service-worker.js
          grep -q 'features-v15-crypto.js' service-worker.js
          grep -q 'verify.html' service-worker.js
          grep -q 'verify.js' service-worker.js

      - name: Validate JSON manifest
        shell: bash
        run: |
          set -euo pipefail
          node -e "JSON.parse(require('fs').readFileSync('manifest.webmanifest', 'utf8')); console.log('Manifest JSON valid')"

      - name: Run cryptographic core self-test
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          global.window = globalThis;
          global.crypto = require('crypto').webcrypto;
          global.CryptoKey = global.crypto.CryptoKey;
          global.btoa = (value) => Buffer.from(value, 'binary').toString('base64');
          global.atob = (value) => Buffer.from(value, 'base64').toString('binary');
          require('./crypto-package-core.js');

          (async () => {
            const core = global.MethodzCryptoPackageV15;
            const pair = await core.generateKeyPair();
            const privateJwk = await core.exportPrivateJwk(pair.privateKey);
            const signed = await core.signPackage(
              { packageType: 'ci-test', record: { title: 'Stable' } },
              privateJwk,
              { signerLabel: 'CI', keyLabel: 'CI Key' }
            );
            const verified = await core.verifyPackage(signed);
            if (!verified.valid) throw new Error(JSON.stringify(verified));
            if (signed.signatureEnvelope.publicKeyJwk.d) throw new Error('Private key material leaked into signature envelope.');

            const packageTampered = JSON.parse(JSON.stringify(signed));
            packageTampered.record.title = 'Tampered';
            const packageResult = await core.verifyPackage(packageTampered);
            if (packageResult.valid) throw new Error('Tampered package unexpectedly verified.');

            const metadataTampered = JSON.parse(JSON.stringify(signed));
            metadataTampered.signatureEnvelope.signerLabel = 'Altered Signer';
            const metadataResult = await core.verifyPackage(metadataTampered);
            if (metadataResult.valid || metadataResult.signatureValid) {
              throw new Error('Tampered signature metadata unexpectedly verified.');
            }
            console.log('Cryptographic core self-test passed.');
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

  browser-smoke-tests:
    runs-on: ubuntu-latest
    needs: validate-static-app
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install browser test runner
        run: npm install --no-save @playwright/test@1.53.2

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Start static server
        shell: bash
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/methodz-http.log 2>&1 &
          echo $! > /tmp/methodz-http.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/meeting.html > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/methodz-http.log
          exit 1

      - name: Run browser smoke tests
        run: npx playwright test

      - name: Upload browser traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: methodz-browser-test-results
          path: test-results/
          if-no-files-found: ignore
