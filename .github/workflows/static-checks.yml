name: Static and Browser Checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate-static-app:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            node --check "$file"
          done < <(find . -type f -name '*.js' -not -path './.git/*' -print0)
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            node --check "$file"
          done < <(find . -type f -name '*.mjs' -not -path './.git/*' -print0)

      - name: Verify required static entry points
        shell: bash
        run: |
          set -euo pipefail
          test -f meeting.html
          test -f archive.html
          test -f verify.html
          test -f verify.js
          test -f style.css
          test -f config.js
          test -f config-v11.js
          test -f config-v12.js
          test -f config-v13.js
          test -f config-v14.js
          test -f config-v15.js
          test -f config-v16.js
          test -f config-v162.js
          test -f migrations.js
          test -f migrations-v10.js
          test -f migrations-v11.js
          test -f migrations-v12.js
          test -f migrations-v13.js
          test -f migrations-v14.js
          test -f migrations-v15.js
          test -f migrations-v16.js
          test -f data-adapter.js
          test -f async-data-adapter.js
          test -f attachment-adapter.js
          test -f crypto-package-core.js
          test -f workspace-package-core.js
          test -f key-custody-core.js
          test -f app.js
          test -f features-v11-retention.js
          test -f features-v11-redaction.js
          test -f features-v11-redaction-policy.js
          test -f features-v12-export-approval.js
          test -f features-v12-fingerprint-policy.js
          test -f features-v12-release-audit.js
          test -f features-v12-compatibility.js
          test -f features-v13-disposition.js
          test -f features-v13.css
          test -f features-v14-recipient-policy.js
          test -f features-v14-policy-hardening.js
          test -f features-v14.css
          test -f features-v15-policy-operations.js
          test -f features-v15-download-routing.js
          test -f features-v15.css
          test -f features-v16-crypto.js
          test -f features-v16-record-metadata.js
          test -f features-v16-recovery.js
          test -f features-v16-recovery-guards.js
          test -f features-v16.css
          test -f features-v16-recovery.css
          test -f features-v162-key-custody.js
          test -f features-v162-startup.js
          test -f features-v162-hardening.js
          test -f features-v162.css
          test -f archive-v11.js
          test -f archive-v13.js
          test -f manifest.webmanifest
          test -f service-worker.js
          test -f tests/v12-smoke.spec.js
          test -f tests/v13-smoke.spec.js
          test -f tests/v14-smoke.spec.js
          test -f tests/v14-stability.spec.js
          test -f tests/v15-smoke.spec.js
          test -f tests/v15-ledger.spec.js
          test -f tests/v16-crypto.spec.js
          test -f tests/v16-recovery.spec.js
          test -f tests/v162-key-custody.spec.js
          test -f tests/v16-crypto-core.mjs
          test -f tests/v16-recovery-core.mjs
          test -f tests/v162-key-custody-core.mjs

      - name: Verify v1.6.2 assets are loaded
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'features-v16.css' meeting.html
          grep -q 'features-v16-recovery.css' meeting.html
          grep -q 'features-v162.css' meeting.html
          grep -q 'config-v16.js' meeting.html
          grep -q 'config-v162.js' meeting.html
          grep -q 'migrations-v16.js' meeting.html
          grep -q 'crypto-package-core.js' meeting.html
          grep -q 'workspace-package-core.js' meeting.html
          grep -q 'key-custody-core.js' meeting.html
          grep -q 'features-v16-crypto.js' meeting.html
          grep -q 'features-v16-record-metadata.js' meeting.html
          grep -q 'features-v16-recovery.js' meeting.html
          grep -q 'features-v16-recovery-guards.js' meeting.html
          grep -q 'features-v162-key-custody.js' meeting.html
          grep -q 'features-v162-startup.js' meeting.html
          grep -q 'features-v162-hardening.js' meeting.html
          grep -q 'config-v16.js' archive.html
          grep -q 'config-v162.js' archive.html
          grep -q 'migrations-v16.js' archive.html
          grep -q 'crypto-package-core.js' verify.html
          grep -q 'verify.js' verify.html
          grep -q 'methodz-meeting-manager-v1.6.2' service-worker.js
          grep -q 'schemaVersion = "1.6.0"' config-v16.js
          grep -q 'appShellVersion = "1.6.2"' config-v162.js
          grep -q 'features-v162.css' service-worker.js
          grep -q 'config-v162.js' service-worker.js
          grep -q 'key-custody-core.js' service-worker.js
          grep -q 'features-v162-key-custody.js' service-worker.js
          grep -q 'features-v162-startup.js' service-worker.js
          grep -q 'features-v162-hardening.js' service-worker.js
          grep -q 'verify.html' service-worker.js
          grep -q 'verify.js' service-worker.js

      - name: Run v1.6 Node Web Crypto self-test
        run: node tests/v16-crypto-core.mjs

      - name: Run v1.6.1 recovery validation self-test
        run: node tests/v16-recovery-core.mjs

      - name: Run v1.6.2 public-key custody self-test
        run: node tests/v162-key-custody-core.mjs

      - name: Validate JSON manifest
        shell: bash
        run: |
          set -euo pipefail
          node -e "JSON.parse(require('fs').readFileSync('manifest.webmanifest', 'utf8')); console.log('Manifest JSON valid')"

  browser-smoke-tests:
    name: Browser checks (${{ matrix.suite }})
    runs-on: ubuntu-latest
    needs: validate-static-app
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: existing-regression
            test_command: npx playwright test --reporter=line --grep-invert "^Recovery v1\\.6\\.1:|^Key custody v1\\.6\\.2:"
          - suite: recovery-architecture
            test_command: npx playwright test tests/v16-recovery.spec.js --reporter=line --grep "recovery readiness panel|configured package limits"
          - suite: recovery-drill
            test_command: npx playwright test tests/v16-recovery.spec.js --reporter=line --grep "current workspace recovery drill|configured drill history cap"
          - suite: recovery-private-key
            test_command: npx playwright test tests/v16-recovery.spec.js --reporter=line --grep "backup inspection blocks private JWK"
          - suite: key-custody
            test_command: npx playwright test tests/v162-key-custody.spec.js --reporter=line
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install browser test runner
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save --silent @playwright/test@1.53.2 > /tmp/npm-install.log 2>&1 || {
            tail -n 200 /tmp/npm-install.log
            exit 1
          }

      - name: Install Chromium
        shell: bash
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1 || {
            tail -n 200 /tmp/playwright-install.log
            exit 1
          }

      - name: Start static server
        shell: bash
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/methodz-http.log 2>&1 &
          echo $! > /tmp/methodz-http.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/meeting.html > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/methodz-http.log
          exit 1

      - name: Run ${{ matrix.suite }} browser tests
        shell: bash
        run: |
          set -o pipefail
          ${{ matrix.test_command }} 2>&1 | tee /tmp/playwright-output.log

      - name: Publish concise failure diagnostic
        if: failure() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SUITE: ${{ matrix.suite }}
        run: |
          set -euo pipefail
          marker="<!-- methodz-ci-diagnostic:${SUITE} -->"
          {
            echo "$marker"
            echo "### Browser checks failed: \`${SUITE}\`"
            echo
            echo "Commit: \`${GITHUB_SHA}\`"
            echo
            echo '```text'
            tail -n 180 /tmp/playwright-output.log
            echo '```'
          } > /tmp/methodz-ci-comment.md

          comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | tail -n 1)"
          if [ -n "$comment_id" ]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" --field body=@/tmp/methodz-ci-comment.md >/dev/null
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --field body=@/tmp/methodz-ci-comment.md >/dev/null
          fi

      - name: Upload browser traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: methodz-browser-test-results-${{ matrix.suite }}
          path: test-results/
          if-no-files-found: ignore
