name: Static and Browser Checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate-static-app:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            node --check "$file"
          done < <(find . -type f -name '*.js' -not -path './.git/*' -print0)
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            node --check "$file"
          done < <(find . -type f -name '*.mjs' -not -path './.git/*' -print0)

      - name: Verify required static entry points
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            meeting.html archive.html verify.html verify.js style.css
            config.js config-v11.js config-v12.js config-v13.js config-v14.js config-v15.js
            config-v16.js config-v162.js config-v163.js config-v164.js
            migrations.js migrations-v10.js migrations-v11.js migrations-v12.js migrations-v13.js
            migrations-v14.js migrations-v15.js migrations-v16.js
            provider-contract.js hosted-provider-adapters.js provider-conformance.js http-provider-pilot.js
            data-adapter.js async-data-adapter.js attachment-adapter.js
            crypto-package-core.js key-custody-core.js workspace-package-core.js app.js
            features-v11-retention.js features-v11-redaction.js features-v11-redaction-policy.js
            features-v12-export-approval.js features-v12-fingerprint-policy.js features-v12-release-audit.js
            features-v12-compatibility.js features-v13-disposition.js features-v13.css
            features-v14-recipient-policy.js features-v14-policy-hardening.js features-v14.css
            features-v15-policy-operations.js features-v15-download-routing.js features-v15.css
            features-v16-crypto.js features-v16-record-metadata.js features-v16-recovery.js
            features-v16-recovery-guards.js features-v16.css features-v16-recovery.css
            features-v162-custody.js features-v162.css archive-v11.js archive-v13.js
            manifest.webmanifest service-worker.js
            tests/v12-smoke.spec.js tests/v13-smoke.spec.js tests/v14-smoke.spec.js
            tests/v14-stability.spec.js tests/v15-smoke.spec.js tests/v15-ledger.spec.js
            tests/v16-crypto.spec.js tests/v16-recovery.spec.js tests/v16-crypto-core.mjs
            tests/v16-recovery-core.mjs tests/v162-custody.spec.js tests/v162-custody-core.mjs
            tests/generate-v162-disposable-fixture.mjs tests/v162-fixture-core.mjs
            tests/v162-fixture.spec.js tests/v163-provider-conformance.mjs tests/v164-provider-pilot.mjs
            docs/V1.6.2-VERIFICATION-CONFORMANCE.md docs/V1.6.3-PROVIDER-CONTRACT.md
            docs/V1.6.3-TESTS.md docs/V1.6.4-PROVIDER-PILOT.md docs/V1.6.4-TESTS.md
            docs/PRODUCTION-PROVIDER-EVIDENCE.md
          )
          for file in "${required_files[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done

      - name: Verify v1.6.4 assets are loaded
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'features-v16.css' meeting.html
          grep -q 'features-v16-recovery.css' meeting.html
          grep -q 'features-v162.css' meeting.html
          grep -q 'config-v16.js' meeting.html
          grep -q 'config-v162.js' meeting.html
          grep -q 'config-v163.js' meeting.html
          grep -q 'config-v164.js' meeting.html
          grep -q 'migrations-v16.js' meeting.html
          grep -q 'provider-contract.js' meeting.html
          grep -q 'hosted-provider-adapters.js' meeting.html
          grep -q 'crypto-package-core.js' meeting.html
          grep -q 'key-custody-core.js' meeting.html
          grep -q 'workspace-package-core.js' meeting.html
          grep -q 'features-v16-crypto.js' meeting.html
          grep -q 'features-v16-record-metadata.js' meeting.html
          grep -q 'features-v162-custody.js' meeting.html
          grep -q 'features-v16-recovery.js' meeting.html
          grep -q 'features-v16-recovery-guards.js' meeting.html
          grep -q 'config-v16.js' archive.html
          grep -q 'config-v164.js' archive.html
          grep -q 'migrations-v16.js' archive.html
          grep -q 'crypto-package-core.js' verify.html
          grep -q 'verify.js' verify.html
          grep -q 'methodz-meeting-manager-v1.6.4' service-worker.js
          grep -q 'schemaVersion = "1.6.0"' config-v16.js
          grep -q 'appShellVersion = "1.6.4"' config-v164.js
          grep -q 'config-v164.js' service-worker.js
          grep -q 'provider-contract.js' service-worker.js
          grep -q 'hosted-provider-adapters.js' service-worker.js
          grep -q 'key-custody-core.js' service-worker.js
          grep -q 'features-v162-custody.js' service-worker.js
          grep -q 'verify.html' service-worker.js
          grep -q 'verify.js' service-worker.js
          ! grep -Eq 'http-provider-pilot\.js' meeting.html archive.html verify.html service-worker.js

      - name: Run v1.6 Node Web Crypto self-test
        run: node tests/v16-crypto-core.mjs

      - name: Run v1.6.1 recovery validation self-test
        run: node tests/v16-recovery-core.mjs

      - name: Run v1.6.2 key custody self-test
        run: node tests/v162-custody-core.mjs

      - name: Generate disposable public verification fixture
        run: node tests/generate-v162-disposable-fixture.mjs

      - name: Verify disposable fixture with the Node core
        run: node tests/v162-fixture-core.mjs

      - name: Upload disposable signed fixture
        uses: actions/upload-artifact@v4
        with:
          name: methodz-v162-disposable-signed-fixture
          path: .methodz-ci/fixtures/methodz-v162-disposable-signed-package.json
          if-no-files-found: error
          retention-days: 7

      - name: Validate JSON manifest
        shell: bash
        run: |
          set -euo pipefail
          node -e "JSON.parse(require('fs').readFileSync('manifest.webmanifest', 'utf8')); console.log('Manifest JSON valid')"

  provider-conformance:
    name: Hosted provider conformance
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run disposable memory and local provider contract suite
        run: node tests/v163-provider-conformance.mjs

  browser-smoke-tests:
    name: Browser checks (${{ matrix.suite }} / ${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: validate-static-app
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: existing-regression
            browser: chromium
            test_command: npx playwright test --reporter=line --grep-invert "^Recovery v1\.6\.1:|^Custody v1\.6\.2:|^Portable signed fixture v1\.6\.2:"
          - suite: recovery-architecture
            browser: chromium
            test_command: npx playwright test tests/v16-recovery.spec.js --reporter=line --grep "recovery readiness panel|configured package limits"
          - suite: recovery-drill
            browser: chromium
            test_command: npx playwright test tests/v16-recovery.spec.js --reporter=line --grep "current workspace recovery drill|configured drill history cap"
          - suite: recovery-private-key
            browser: chromium
            test_command: npx playwright test tests/v16-recovery.spec.js --reporter=line --grep "backup inspection blocks private JWK"
          - suite: custody-operations
            browser: chromium
            test_command: npx playwright test tests/v162-custody.spec.js --reporter=line
          - suite: portable-fixture
            browser: chromium
            test_command: npx playwright test tests/v162-fixture.spec.js --reporter=line
          - suite: portable-fixture
            browser: firefox
            test_command: npx playwright test tests/v162-fixture.spec.js --reporter=line
          - suite: portable-fixture
            browser: webkit
            test_command: npx playwright test tests/v162-fixture.spec.js --reporter=line
    env:
      METHODZ_BROWSER: ${{ matrix.browser }}
      METHODZ_FIXTURE_PATH: .methodz-ci/fixtures/methodz-v162-disposable-signed-package.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install browser test runner
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save --silent @playwright/test@1.53.2 > /tmp/npm-install.log 2>&1 || {
            tail -n 200 /tmp/npm-install.log
            exit 1
          }

      - name: Install ${{ matrix.browser }}
        shell: bash
        run: |
          set -euo pipefail
          npx playwright install --with-deps "${{ matrix.browser }}" > /tmp/playwright-install.log 2>&1 || {
            tail -n 200 /tmp/playwright-install.log
            exit 1
          }

      - name: Generate disposable public verification fixture
        run: node tests/generate-v162-disposable-fixture.mjs "$METHODZ_FIXTURE_PATH"

      - name: Start static server
        shell: bash
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/methodz-http.log 2>&1 &
          echo $! > /tmp/methodz-http.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/meeting.html > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/methodz-http.log
          exit 1

      - name: Run ${{ matrix.suite }} browser tests in ${{ matrix.browser }}
        shell: bash
        run: |
          set -o pipefail
          ${{ matrix.test_command }} 2>&1 | tee /tmp/playwright-output.log

      - name: Publish concise failure diagnostic
        if: failure() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SUITE: ${{ matrix.suite }}
          BROWSER: ${{ matrix.browser }}
        run: |
          set -euo pipefail
          marker="<!-- methodz-ci-diagnostic:${SUITE}:${BROWSER} -->"
          {
            echo "$marker"
            echo "### Browser checks failed: \`${SUITE}\` / \`${BROWSER}\`"
            echo
            echo "Commit: \`${GITHUB_SHA}\`"
            echo
            echo '```text'
            tail -n 180 /tmp/playwright-output.log
            echo '```'
          } > /tmp/methodz-ci-comment.md

          comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | tail -n 1)"
          if [ -n "$comment_id" ]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" --field body=@/tmp/methodz-ci-comment.md >/dev/null
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --field body=@/tmp/methodz-ci-comment.md >/dev/null
          fi

      - name: Upload browser traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: methodz-browser-test-results-${{ matrix.suite }}-${{ matrix.browser }}
          path: test-results/
          if-no-files-found: ignore
