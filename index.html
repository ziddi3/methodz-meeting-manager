<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Professional meeting management for Method HVAC Inc. and partner organizations.">
  <meta name="theme-color" content="#1a56db">

  <title>Methodz Meeting Manager</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ── App Header ──────────────────────────────────────────────────── -->
  <header class="app-header" role="banner">
    <div class="app-brand" aria-label="Methodz Meeting Manager">
      <!-- Calendar icon -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round"
           stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Methodz Meeting Manager</span>
    </div>

    <nav class="app-nav" role="navigation" aria-label="Main navigation">
      <button class="nav-btn active" data-view="dashboard"   aria-current="page">Dashboard</button>
      <button class="nav-btn"        data-view="new-meeting"                     >+ New Meeting</button>
      <button class="nav-btn"        data-view="archive"                         >Archive</button>
      <button class="nav-btn"        data-view="search"                          >Search</button>
    </nav>
  </header>

  <!-- ── Main Content ────────────────────────────────────────────────── -->
  <main class="app-main" id="app-main" role="main" aria-live="polite">
    <!-- Views are rendered dynamically by app.js -->
    <noscript>
      <div class="card" style="text-align:center;padding:48px;">
        <p>JavaScript is required to use Methodz Meeting Manager.</p>
      </div>
    </noscript>
  </main>

  <!-- ── Modal Overlay ───────────────────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true"
       aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="modal-title"></h2>
        <button class="btn btn--ghost btn--icon" id="modal-close" aria-label="Close dialog">✕</button>
      </div>
      <div class="modal__body" id="modal-body"></div>
      <div class="modal__footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- ── JavaScript (ES modules) ─────────────────────────────────────── -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
